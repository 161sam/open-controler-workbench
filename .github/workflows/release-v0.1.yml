name: Release v0.1

on:
  push:
    tags:
      - "v0.1.0"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish"
        required: true
        default: "v0.1.0"
      draft:
        description: "Create the GitHub Release as draft"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG_NAME="${{ inputs.tag_name }}"
            DRAFT_VALUE="${{ inputs.draft }}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
            DRAFT_VALUE="false"
          fi

          if [[ "${TAG_NAME}" != "v0.1.0" ]]; then
            echo "This workflow only supports the v0.1.0 release tag." >&2
            exit 1
          fi

          VERSION="${TAG_NAME#v}"
          WORKBENCH_ARCHIVE="ocw-workbench-${TAG_NAME}-freecad-mod.zip"
          CHECKSUM_FILE="ocw-workbench-${TAG_NAME}-sha256.txt"

          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "draft=${DRAFT_VALUE}" >> "${GITHUB_OUTPUT}"
          echo "workbench_archive=${WORKBENCH_ARCHIVE}" >> "${GITHUB_OUTPUT}"
          echo "checksum_file=${CHECKSUM_FILE}" >> "${GITHUB_OUTPUT}"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build pytest pyyaml

      - name: Run release sanity tests
        run: python -m pytest -q tests/unit/test_release_metadata.py tests/unit/test_release_workflow_metadata.py

      - name: Build source and wheel distributions
        run: python -m build --sdist --wheel

      - name: Build GitHub release assets
        run: python scripts/build_release_assets.py --tag "${{ steps.meta.outputs.tag_name }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: Open Controller Workbench ${{ steps.meta.outputs.tag_name }}
          body_path: RELEASE_NOTES_v0.1.md
          draft: ${{ steps.meta.outputs.draft }}
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/release/*.zip
            dist/release/*sha256.txt
